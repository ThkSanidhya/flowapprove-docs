site_name: FlowApprove Docs
site_description: Multi-tenant document approval workflow platform
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: README.md
  - Getting Started: docs/getting-started.md
  - Architecture: docs/architecture.md
  - Data Model: docs/data-model.md
  - API Reference: docs/api-reference.md
  - Development: docs/development.md
  - Deployment: docs/deployment.md
  - Security: docs/security.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true
